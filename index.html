<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación de Boda</title>
  <style>
    body {
      margin: 0;
      background: url('http://localhost/invite/img/TENANGO%20OTOMI%20-%20Malvina%20Ishutina.jfif') no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      image-rendering: auto;
      filter: contrast(1.05) saturate(1.1);
      animation: fondoZoom 20s infinite alternate ease-in-out;
      margin: 0;
      position: relative;
      z-index: 0;
    }

    @keyframes fondoZoom {
      0% { background-size: 100%; }
      100% { background-size: 105%; }
    }

    .contenido {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.85);
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      font-family: 'Georgia', serif;
      animation: fadeIn 3s ease-in;
      max-width: 95%;
      margin-top: 30%;
    }
    .contenido2 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.85);
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      font-family: 'Georgia', serif;
      animation: fadeIn 3s ease-in;
      max-width: 90%;
      margin-top: 60%;
    }
    .contenido,
    .contenido2 {
    display: none; /* oculto al cargar */
    }
     #contador {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 28px;
        color: #6b4f3b;
        padding: 20px 40px;
        border-radius: 15px;
        background: #fffdfb;

        /* Borde tipo bordado */
        border: 3px dashed #c8a97e;

        /* Efecto de relieve tipo tela */
        box-shadow:
        0 0 0 4px #f8f5f2,
        0 4px 10px rgba(0,0,0,0.1),
        inset 0 0 8px rgba(200,169,126,0.3);

        text-align: center;
        letter-spacing: 2px;

        /* Efecto bordado en texto */
        text-shadow:
        1px 1px 0 #fff,
        -1px -1px 0 #e6d3b3,
        0 0 5px rgba(200,169,126,0.4);
    }

  /* Opcional: animación suave tipo brillo de hilo */
  #contador::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    border-radius: 15px;
    pointer-events: none;
    background: linear-gradient(
      120deg,
      transparent 30%,
      rgba(255,255,255,0.4),
      transparent 70%
    );
    opacity: 0;
    animation: brillo 4s infinite;
  }
  /* Modal fondo */
#modalSobre {
  position: fixed;
  inset: 0; /* ocupa toda la pantalla */
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(248, 245, 242, 0.411);
  z-index: 999999;
  isolation: isolate;
  margin-top: 30%;
}

#modalSobre .sobre {
  width: 70vw;   /* 80% del ancho de la ventana */
  height: 30vh;  /* 80% del alto de la ventana */
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffffffa6; /* opcional, para ver el área */
  border-radius: 8px; /* opcional, esquinas redondeadas */
  border: 2px solid #c8a97e;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  overflow: hidden;
  z-index: 99999; 
  transform: translateY(20%);
  margin-top: 15%;
}


/* Tapa */
.tapa {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #e8d5b7;
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 2;
}

/* Carta */
.carta {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fffdfb;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Georgia', serif;
  color: #6b4f3b;
  font-size: 16px;
  z-index: 1;
}

/* Animación abrir */
.sobre.abierto .tapa {
  transform: rotateX(180deg);
}

/* Fade out modal */
#modalSobre.oculto {
  animation: desaparecer 1.5s forwards;
}

@keyframes desaparecer {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

  @keyframes brillo {
    0% { opacity: 0; }
    50% { opacity: 0.6; }
    100% { opacity: 0; }
  }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 2.5rem;
      color: #d6336c;
    }

    p {
      font-size: 1.2rem;
      color: #333;
    }

    @media (min-width: 1024px) {
      body {
        background-size: contain; /* evita que se expanda demasiado */
        background-position: center top; /* acomoda mejor la imagen */
      }
      .contenido{
        max-width: 60%;
        margin-top: 20%;
      }
      .contenido2 {
        max-width: 60%;
        margin-top: 50%;
      }
    }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      p { font-size: 1rem; }
      .contenido { padding: 1.5rem; margin-top: 30%; }
      body{
        background-size: contain;
        background-position: center top;
      }
      .contenido2 { padding: 1.5rem; margin-top: 80%; }
      body{
        background-size: contain;
        background-position: center top;
      }
    }

    @media (max-width: 480px) {
      h1 { font-size: 0.9rem; }
      p { font-size: 0.7rem; }
      .contenido { padding: 1.1rem; border-radius: 15px; margin-top: 35%; }
      body {
        background-size: contain; /* evita que se expanda demasiado */
        background-position: center top; /* acomoda mejor la imagen */
      }
      .contenido2 { padding: 1.1rem; border-radius: 15px; margin-top: 85%; }
      #contador {
            font-size: 12px;
            padding: 10px 20px;
        }
      body {
        background-size: contain; /* evita que se expanda demasiado */
        background-position: center top; /* acomoda mejor la imagen */
      }
    }
    @media (min-width: 470px) {
      h1 { font-size: 1rem; }
      p { font-size: 1rem; }
      .contenido { padding: 1rem; border-radius: 15px; margin-top: 35%; }
      body {
        background-size: contain; /* evita que se expanda demasiado */
        background-position: center top; /* acomoda mejor la imagen */
      }
      .contenido2 { padding: 1.1rem; border-radius: 15px; margin-top: 70%; }
      #contador {
            font-size: 4rem;
            padding: 10px 20px;
        }
      body {
        background-size: contain; /* evita que se expanda demasiado */
        background-position: center top; /* acomoda mejor la imagen */
      }
    }
  </style>
</head>
<body>
  <div class="contenido">
    <h1>Nuestra boda <br> Ana & Horacio</h1>
  </div>
  <div class="contenido2">
    <div id="contador"></div>
  </div>
    <div id="modalSobre">
        <div class="sobre" onclick="abrirInvitacion()">
            <div class="tapa"></div>
            <div class="carta">
            </div>
        </div>
    </div>

    <audio id="musica" loop>
    <source src="tu-cancion.mp3" type="audio/mpeg">
    </audio>
   <script>
    const fechaBoda = new Date("August 01, 2026 00:00:00").getTime();

    const temporizador = setInterval(() => {
      const ahora = new Date().getTime();
      const diferencia = fechaBoda - ahora;

      if (diferencia < 0) {
        document.getElementById("contador").innerHTML = "¡Ya llegó el gran día!";
        clearInterval(temporizador);
        return;
      }

      const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

      document.getElementById("contador").innerHTML =
        dias + " días " + horas + "Hrs " + minutos + "Min " + segundos + "Seg";
    }, 1000);

  function abrirInvitacion() {
    const sobre = document.querySelector(".sobre");
    const modal = document.getElementById("modalSobre");
    const musica = document.getElementById("musica");

    // Animación de abrir sobre
    sobre.classList.add("abierto");

    // Reproducir música
    musica.play();

    // Ocultar modal después de animación
    setTimeout(() => {
        modal.classList.add("oculto");

        // Mostrar contenido principal
        document.querySelector(".contenido").style.display = "block";
        document.querySelector(".contenido2").style.display = "block";
    }, 1200);
    }
    </script>

</body>
</html>
