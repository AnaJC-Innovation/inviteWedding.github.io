<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuestra boda</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SECCIÓN PRINCIPAL -->
<section class="hero d-flex align-items-center text-center">
  <div class="container contenido">
    <div class="row justify-content-center gy-5">
      <div class="col-12 mb-12">
        <h1 class="display-8 display-md-6 fw-bold fondosPrimary tittle">
          Nuestra boda <br> Ana & Horacio
        </h1>
      </div>
      <div class="col-12 mb-12">
        <div id="contador" class="contador"></div>
      </div>
      <div class="col-12 py-4 hero2 gy-4">
        <div class="d-flex justify-content-center">
          <div class="marco-img text-center">
            <img src="img/a.jpg" class="img-fluid rounded" alt="cabeceraA">
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<div class="col-12 d-flex align-items-center text-center justify-content-center">
  <p id="textoTyping" class="lead texto-grande text-white fst-italic p-4">
  </p>
</div>



<!-- MODAL SOBRE -->
<div id="modalSobre" class="d-flex justify-content-center align-items-center">
  <div class="sobre" onclick="abrirInvitacion()">
    <div class="tapa"></div>
    <div class="carta">Haz clic para abrir</div>
  </div>
</div>

<!-- AUDIO -->
<audio id="musica" loop>
  <source src="tu-cancion.mp3" type="audio/mpeg">
</audio>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>


<script>
const texto = `Dos caminos, una historia.
Dos corazones, un mismo latido.
Acompáñanos en el inicio de nuestra nueva vida.`;

let i = 0;
const velocidad = 40; // más bajo = más rápido

function escribir() {
  if (i < texto.length) {
    document.getElementById("textoTyping").innerHTML += 
      texto.charAt(i) === "\n" ? "<br>" : texto.charAt(i);
    i++;
    setTimeout(escribir, velocidad);
  }
}

window.addEventListener("load", escribir);
</script>
<script>
const fechaBoda = new Date("August 01, 2026 00:00:00").getTime();

const temporizador = setInterval(() => {
  const ahora = new Date().getTime();
  const diferencia = fechaBoda - ahora;

  if (diferencia < 0) {
    document.getElementById("contador").innerHTML = "¡Ya llegó el gran día!";
    clearInterval(temporizador);
    return;
  }

  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
  const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

  document.getElementById("contador").innerHTML =
    `${dias} días ${horas} hrs ${minutos} min ${segundos} seg`;
}, 1000);

function abrirInvitacion() {
  const sobre = document.querySelector(".sobre");
  const modal = document.getElementById("modalSobre");
  const musica = document.getElementById("musica");

  sobre.classList.add("abierto");
  musica.play();

  setTimeout(() => {
    modal.classList.add("oculto");
    document.querySelector(".contenido").style.display = "block";
  }, 1200);
}
</script>

</body>
</html>
